<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Graphics Auto</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Mulish:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/homestyle.css}">
</head>

<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <!-- HEADER -->
    <header>
        <div class="header-inner">
            <div class="brand">
                <div class="brand-icon">⬡</div>
                <div class="brand-text">
                    <h1>Graphics Auto</h1>
                    <span class="tagline">All your graphic assignments at one place</span>
                </div>
            </div>
            <button class="logout-btn" onclick="window.location.href='/logout'">
                <svg viewBox="0 0 20 20" fill="none" width="16" height="16">
                    <path d="M13 10H3m0 0l3-3m-3 3l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M8 5V4a1 1 0 011-1h6a1 1 0 011 1v12a1 1 0 01-1 1H9a1 1 0 01-1-1v-1" stroke="currentColor"
                        stroke-width="1.5" stroke-linecap="round" />
                </svg>
            </button>
        </div>
    </header>

    <!-- FILTER -->
    <section class="filter-section">
        <div class="filter-inner">
            <label for="collegeFilter">Filter by College</label>
            <div class="select-wrap">
                <select id="collegeFilter" onchange="filterCards()">
                    <option value="ALL">All Colleges</option>
                    <option value="MAIT">MAIT</option>
                    <option value="MSIT">MSIT</option>
                    <option value="BVCOE">BVCOE</option>
                    <option value="ADGIPS">ADGIPS</option>
                    <option value="HMR">HMR</option>
                </select>
                <svg class="select-arrow" viewBox="0 0 20 20" fill="none">
                    <path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
        </div>
    </section>

    <!-- ASSIGNMENT GRID -->
    <main class="assignment-container">

        <div class="grid" id="assignmentGrid">

            <!-- Cards are rendered by Thymeleaf via th:each -->
            <div class="assignmentCard" th:each="assignment : ${assignments}"
                th:attr="data-college=${assignment.collegeOfAssignment}">
                <div class="assignmentImage">
                    <img th:if="${assignment.imageUrl != null}" th:src="${assignment.imageUrl}" alt="Assignment Image">
                    <div th:unless="${assignment.imageUrl != null}" class="img-placeholder">
                        <svg viewBox="0 0 40 40" fill="none" width="36" height="36">
                            <rect x="4" y="8" width="32" height="24" rx="3" stroke="currentColor" stroke-width="1.5" />
                            <circle cx="14" cy="17" r="3" stroke="currentColor" stroke-width="1.5" />
                            <path d="M4 28l8-6 6 5 5-4 9 7" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <span>No Image</span>
                    </div>
                </div>
                <div class="assignmentDetails">
                    <p class="assignment-name" th:text="${assignment.nameOfAssignment}">Assignment Name</p>
                    <div class="detail-row">
                        <span class="detail-label">Size</span>
                        <span class="detail-value" th:text="${assignment.dimensionOfAssignment}">—</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">College</span>
                        <span class="detail-value college-badge" th:text="${assignment.collegeOfAssignment}">—</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Branch</span>
                        <span class="detail-value" th:text="${assignment.branchOfAssignment}">—</span>
                    </div>
                    <div class="detail-row price-row">
                        <span class="detail-label">Price</span>
                        <span class="price-value" th:text="${assignment.priceOfAssignment}">—</span>
                    </div>
                </div>
                <button type="button" class="buy-btn">Buy Now</button>
            </div>

        </div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <svg viewBox="0 0 60 60" fill="none" width="48" height="48">
                <circle cx="30" cy="30" r="26" stroke="currentColor" stroke-width="1.5" />
                <path d="M20 30h20M30 20v20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            <p>No assignments found for this college.</p>
        </div>

        <!-- Footer CTA -->
        <div class="cta-footer">
            <p class="cta-text">Couldn't find your assignment?</p>
            <a href="https://instagram.com/ayush98970" target="_blank" class="cta-link">
                <svg viewBox="0 0 20 20" fill="none" width="15" height="15">
                    <rect x="3" y="3" width="14" height="14" rx="4" stroke="currentColor" stroke-width="1.3" />
                    <circle cx="10" cy="10" r="3.2" stroke="currentColor" stroke-width="1.3" />
                    <circle cx="14.2" cy="5.8" r="0.8" fill="currentColor" />
                </svg>
                Upload it &amp; get it done for free
            </a>
        </div>

    </main>

    <script th:src="@{/homescript.js}"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin — Graphics Auto</title>
    <link rel="icon" type="image/png" href="/img/favicon-16x16.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/adminstyle.css}">
</head>

<body>

<!-- HEADER -->
<header>
    <div class="header-inner">
        <div class="brand">
            <div class="brand-icon">⬡</div>
            <div class="brand-text">
                <h1>Graphics Auto</h1>
                <span class="tagline">Administration</span>
            </div>
        </div>
        <span class="admin-badge">Admin</span>
    </div>
</header>

<!-- MAIN -->
<main class="page-main">

    <div class="page-title">
        <h2>Dashboard</h2>
        <p>Manage assignments, referral codes, and track revenue.</p>
    </div>

    <div class="admin-layout">

        <!-- ── LEFT: Upload Assignment ───────────── -->
        <div class="admin-left">
            <div class="card">
                <div class="card-header">
                    <svg viewBox="0 0 20 20" fill="none" width="15" height="15">
                        <path d="M10 3v10M5 8l5-5 5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Upload Assignment</span>
                </div>

                <form id="assignmentUploader">
                    <div class="inputs">

                        <div class="field-group">
                            <label for="name">Assignment Name</label>
                            <input type="text" placeholder="e.g. Technical Drawing — Sheet A" id="name">
                        </div>

                        <div class="field-row">
                            <div class="field-group">
                                <label for="image">Preview Image</label>
                                <div class="file-input-wrap">
                                    <input type="file" accept=".png,.jpg,.jpeg" id="image"
                                           onchange="document.getElementById('imageName').textContent = this.files[0]?.name || 'Choose image…'">
                                    <div class="file-label">
                                        <svg viewBox="0 0 20 20" fill="none" width="13" height="13">
                                            <rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/>
                                            <circle cx="7" cy="8.5" r="1.5" stroke="currentColor" stroke-width="1.2"/>
                                            <path d="M2 13l4-3 4 3 3-4 5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                        <span id="imageName">Choose image…</span>
                                    </div>
                                </div>
                            </div>
                            <div class="field-group">
                                <label for="script-name">Automation Script</label>
                                <div class="file-input-wrap">
                                    <input type="file" accept=".js" id="script-name"
                                           onchange="document.getElementById('scriptName').textContent = this.files[0]?.name || 'Choose .js…'">
                                    <div class="file-label">
                                        <svg viewBox="0 0 20 20" fill="none" width="13" height="13">
                                            <path d="M5 4h7l3 3v9a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1z" stroke="currentColor" stroke-width="1.4"/>
                                            <path d="M12 4v3h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                                            <path d="M7 11l2 2-2 2M11 15h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                        <span id="scriptName">Choose .js…</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="field-row">
                            <div class="field-group">
                                <label for="college">College</label>
                                <div class="select-wrap">
                                    <select id="college">
                                        <option value="">Select college</option>
                                        <option value="MAIT">MAIT</option>
                                        <option value="MSIT">MSIT</option>
                                        <option value="BVCOE">BVCOE</option>
                                        <option value="ADGIPS">ADGIPS</option>
                                        <option value="HMR">HMR</option>
                                    </select>
                                    <svg class="select-arrow" viewBox="0 0 20 20" fill="none">
                                        <path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </div>
                            </div>
                            <div class="field-group">
                                <label for="branch">Branch</label>
                                <input type="text" placeholder="e.g. CSE, IT, ME" id="branch">
                            </div>
                        </div>

                        <div class="field-row">
                            <div class="field-group">
                                <label for="dimension">Dimension</label>
                                <input type="text" placeholder="e.g. A4, 24×36" id="dimension">
                            </div>
                        </div>

                        <div class="field-group">
                            <label for="price">Price</label>
                            <div class="input-prefix-wrap">
                                <span class="input-prefix">₹</span>
                                <input type="text" placeholder="0.00" id="price">
                            </div>
                        </div>

                    </div>

                    <div class="form-footer">
                        <span class="waiting-message" id="waitingMessage"></span>
                        <button type="button" id="submitBtn" onclick="uploadAssignment()">
                            <span class="spinner" id="spinner"></span>
                            <span class="btn-text" id="btnText">Upload Assignment</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ── RIGHT: Stats + Referral + Errors ───────────── -->
        <div class="admin-right">

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-label">Total Earnings</span>
                    <span class="stat-value" id="Earnings" th:text="'₹' + ${TotalEarning}">₹0</span>
                    <span class="stat-sub">All-time revenue</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Active Codes</span>
                    <span class="stat-value" id="activeCodeCount">0</span>
                    <span class="stat-sub">Referrals live</span>
                </div>
            </div>

            <!-- Referral Codes -->
            <div class="card">
                <div class="card-header">
                    <svg viewBox="0 0 20 20" fill="none" width="15" height="15">
                        <path d="M12.5 2.5l5 5-9 9-5 1 1-5 9-9z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Referral Codes</span>
                </div>

                <div class="referral-form">
                    <div class="field-group" style="flex:1; min-width:90px;">
                        <label for="newCode">Code</label>
                        <input type="text" id="newCode" placeholder="FRIEND20" class="code-input">
                    </div>
                    <div class="field-group discount-field">
                        <label for="discountVal">Discount</label>
                        <div class="input-prefix-wrap">
                            <span class="input-prefix">₹</span>
                            <input type="number" id="discountVal" placeholder="0">
                        </div>
                    </div>
                    <button type="button" class="add-code-btn" onclick="addReferralCode()">
                        <svg viewBox="0 0 20 20" fill="none" width="12" height="12">
                            <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                        </svg>
                        Add
                    </button>
                    <button type="button" class="home-page" onclick="redirectToHome()">Home</button>
                </div>

                <div class="code-list" id="codeList">
                    <div class="code-list-empty" id="codeListEmpty">
                        <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                            <rect x="3" y="3" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.3" stroke-dasharray="3 2"/>
                        </svg>
                        No referral codes yet
                    </div>
                </div>
            </div>

            <!-- ── Error Log ───────────── -->
            <div class="card">
                <div class="card-header">
                    <svg viewBox="0 0 20 20" fill="none" width="15" height="15">
                        <path d="M10 3L2 17h16L10 3z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M10 8v4M10 14v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <span>Error Log</span>
                    <span class="error-count-badge" id="errorCount">0 errors</span>
                </div>

                <div class="error-list" id="errorList">
                    <div class="error-list-empty" id="errorListEmpty">
                        <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                            <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.3"/>
                            <path d="M10 7v4M10 13v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        No errors logged
                    </div>
                </div>

                <div class="error-footer">
                    <button class="clear-errors-btn" onclick="clearErrors()">Clear All</button>
                </div>
            </div>

        </div>
    </div>
</main>

<script th:src="@{/adminscript.js}"></script>

</body>
</html>

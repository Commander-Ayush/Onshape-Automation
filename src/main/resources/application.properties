spring.application.name=OnshapeAutomationv1

# Datasource
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.connection-init-sql=SELECT 1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

razorpay.api.key=${API_KEY}
razorpay.api.secret=${API_SECRET}

cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME}
cloudinary.cloud.key=${CLOUDINARY_API_KEY}
cloudinary.cloud.secret=${CLOUDINARY_SECRET}

test.emailId=${TEST_EMAIL_FOR_PAYMENT_SERVICE}
test.password=${TEST_PASSWORD_FOR_PAYMENT_SERVICE}

file.upload.location=${SCRIPT_LOCATION}
name: Build Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/graphics-auto:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker network create traefik-proxy || true

            docker inspect traefik > /dev/null 2>&1 || docker run -d \
              --name traefik \
              --restart unless-stopped \
              --network traefik-proxy \
              -p 80:80 \
              -p 443:443 \
              -v /var/run/docker.sock:/var/run/docker.sock:ro \
              -v letsencrypt:/letsencrypt \
              traefik:v2.11 \
              --providers.docker=true \
              --providers.docker.exposedbydefault=false \
              --entrypoints.web.address=:80 \
              --entrypoints.websecure.address=:443 \
              --entrypoints.web.http.redirections.entryPoint.to=websecure \
              --entrypoints.web.http.redirections.entryPoint.scheme=https \
              --certificatesresolvers.letsencrypt.acme.email=graphicsauto365@gmail.com \
              --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json \
              --certificatesresolvers.letsencrypt.acme.httpchallenge=true \
              --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web

            docker stop graphics-auto || true
            docker rm graphics-auto || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/graphics-auto:latest
            docker run -d \
              --name graphics-auto \
              --restart unless-stopped \
              --network traefik-proxy \
              --label traefik.enable=true \
              --label "traefik.http.routers.app.rule=Host(\`graphicsauto.in\`)" \
              --label traefik.http.routers.app.entrypoints=websecure \
              --label traefik.http.routers.app.tls.certresolver=letsencrypt \
              --label traefik.http.services.app.loadbalancer.server.port=8080 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e MASTERS_EMAIL="${{ secrets.MASTERS_EMAIL }}"\
              -e DATABASE_USERNAME="${{ secrets.DATABASE_USERNAME }}" \
              -e DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}" \
              -e API_KEY="${{ secrets.API_KEY }}" \
              -e API_SECRET="${{ secrets.API_SECRET }}" \
              -e CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
              -e CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
              -e CLOUDINARY_SECRET="${{ secrets.CLOUDINARY_SECRET }}" \
              -e TEST_EMAIL_FOR_PAYMENT_SERVICE="${{ secrets.TEST_EMAIL_FOR_PAYMENT_SERVICE }}" \
              -e TEST_PASSWORD_FOR_PAYMENT_SERVICE="${{ secrets.TEST_PASSWORD_FOR_PAYMENT_SERVICE }}" \
              -e SCRIPT_LOCATION="/app/scripts/" \
              -e SENDERS_EMAIL_PASSWORD="${{ secrets.SENDERS_EMAIL_PASSWORD }}" \
              ${{ secrets.DOCKER_USERNAME }}/graphics-auto:latest